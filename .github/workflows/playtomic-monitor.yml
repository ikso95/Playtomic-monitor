name: Playtomic Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: playtomic-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build runtime config
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          test -n "$CALLMEBOT_PHONE"
          test -n "$CALLMEBOT_API_KEY"
          cp config.github.toml config.runtime.toml
          cat <<EOF >> config.runtime.toml

          [notifications.callmebot_whatsapp]
          phone = "$CALLMEBOT_PHONE"
          api_key = "$CALLMEBOT_API_KEY"
          EOF
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            cat <<EOF >> config.runtime.toml

            [notifications.telegram]
            bot_token = "$TELEGRAM_BOT_TOKEN"
            chat_id = "$TELEGRAM_CHAT_ID"
            EOF
          fi

      - name: Run monitor
        run: python3 playtomic_monitor.py --config config.runtime.toml

      - name: Commit state changes
        run: |
          if git diff --quiet -- state/availability_state.json; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/availability_state.json
          git commit -m "Update Playtomic availability state"
          git push
